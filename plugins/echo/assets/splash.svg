<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Watercolor texture filters -->
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="23" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="1.5" result="blurred"/>
      <feComponentTransfer in="blurred">
        <feFuncA type="linear" slope="0.85" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <filter id="watercolor-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="5" seed="31" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="2.5" result="blurred"/>
      <feComponentTransfer in="blurred">
        <feFuncA type="linear" slope="0.7" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <filter id="paper-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" seed="5" result="paper"/>
      <feColorMatrix in="paper" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faint">
        <feFuncA type="linear" slope="0.08" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="5" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <filter id="ink-bleed" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="sound-ripple" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="forestSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a1f"/>
      <stop offset="30%" stop-color="#2a4a38"/>
      <stop offset="60%" stop-color="#1f3a2a"/>
      <stop offset="100%" stop-color="#0f2018"/>
    </linearGradient>
    <linearGradient id="robeGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#c8a050"/>
      <stop offset="30%" stop-color="#a88030"/>
      <stop offset="60%" stop-color="#d4a848"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e0d0"/>
      <stop offset="100%" stop-color="#d4b8a0"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a3520"/>
      <stop offset="50%" stop-color="#7a4a30"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="warmLight" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8c870" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c8a040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5a6a40" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="soundAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d090" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#c8a860" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8a8050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a5a48"/>
      <stop offset="100%" stop-color="#1a3025"/>
    </linearGradient>
    <linearGradient id="ivyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a50"/>
      <stop offset="100%" stop-color="#2a5030"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="800" height="400" fill="#f5f0e8" filter="url(#paper-texture)"/>

  <!-- Forest/mountain backdrop -->
  <rect x="0" y="0" width="800" height="400" fill="url(#forestSky)" opacity="0.8" filter="url(#watercolor-heavy)"/>

  <!-- Distant mountains -->
  <path d="M 0,200 C 80,150 160,180 240,140 C 320,100 400,160 480,120 C 560,80 640,130 720,110 C 760,100 800,120 800,120 L 800,400 L 0,400 Z" fill="url(#mountainGrad)" opacity="0.5" filter="url(#watercolor-heavy)"/>

  <!-- Rocky outcrop / cave entrance suggestion -->
  <path d="M 550,180 C 580,150 620,140 660,155 C 700,170 720,200 730,250 C 735,290 730,340 725,400 L 575,400 C 570,350 560,300 555,260 C 550,230 548,200 550,180 Z" fill="#2a3a2e" opacity="0.6" filter="url(#watercolor)"/>

  <!-- Warm light source -->
  <ellipse cx="280" cy="160" rx="200" ry="180" fill="url(#warmLight)" filter="url(#watercolor)"/>

  <!-- Sound wave rings emanating from Echo -->
  <g filter="url(#sound-ripple)" opacity="0.25">
    <ellipse cx="380" cy="200" rx="120" ry="80" fill="none" stroke="#d4b870" stroke-width="1.5"/>
    <ellipse cx="400" cy="200" rx="180" ry="110" fill="none" stroke="#c8a860" stroke-width="1.2"/>
    <ellipse cx="420" cy="200" rx="240" ry="140" fill="none" stroke="#b89850" stroke-width="0.8"/>
    <ellipse cx="440" cy="200" rx="300" ry="170" fill="none" stroke="#a88840" stroke-width="0.5"/>
  </g>

  <!-- Sound aura -->
  <ellipse cx="350" cy="220" rx="150" ry="120" fill="url(#soundAura)" filter="url(#watercolor)"/>

  <!-- Echo figure - elongated, reaching, longing -->
  <g filter="url(#watercolor)">
    <!-- Flowing robe/chiton - golden, draped -->
    <path d="M 300,160 C 290,185 275,230 265,280 C 255,320 245,360 235,400 L 400,400 C 395,360 388,310 380,270 C 370,230 358,190 345,160 Z" fill="url(#robeGrad)" opacity="0.85"/>

    <!-- Robe folds -->
    <path d="M 295,180 C 287,210 278,250 270,290 C 265,320 258,355 252,390 L 265,390 C 270,355 278,315 285,280 C 292,245 298,210 302,180 Z" fill="#b89030" opacity="0.4"/>
    <path d="M 340,170 C 350,205 362,250 370,290 C 375,315 382,350 388,390 L 375,390 C 370,350 364,315 358,285 C 350,248 342,205 338,170 Z" fill="#9a7020" opacity="0.4"/>

    <!-- Trailing fabric wisps -->
    <path d="M 235,400 C 225,385 220,370 215,395 Z" fill="#c8a050" opacity="0.3"/>
    <path d="M 400,400 C 410,380 415,365 420,392 Z" fill="#c8a050" opacity="0.3"/>

    <!-- Left arm extended - reaching, yearning gesture -->
    <path d="M 290,175 C 260,170 230,160 200,148 C 180,140 160,130 145,118 C 140,115 148,115 158,120 C 175,130 195,140 220,150 C 248,160 275,168 292,172 Z" fill="url(#robeGrad)" opacity="0.75"/>

    <!-- Right arm raised to mouth - calling out -->
    <path d="M 348,165 C 360,155 370,145 375,138 C 378,134 376,132 372,135 C 365,140 358,150 350,160 Z" fill="url(#robeGrad)" opacity="0.75"/>

    <!-- Hands -->
    <path d="M 145,118 C 140,114 135,110 133,112 C 131,115 135,118 140,120 C 143,121 146,120 145,118 Z" fill="url(#skinTone)" opacity="0.75"/>
    <!-- Right hand cupped near mouth -->
    <path d="M 375,138 C 378,134 382,130 380,128 C 377,126 374,130 372,134 C 370,137 372,140 375,138 Z" fill="url(#skinTone)" opacity="0.75"/>

    <!-- Neck -->
    <path d="M 312,155 C 314,145 318,138 322,132 C 326,138 330,145 332,155 Z" fill="url(#skinTone)" opacity="0.7"/>

    <!-- Face - turned slightly, mouth open as if calling -->
    <ellipse cx="322" cy="116" rx="20" ry="26" fill="url(#skinTone)" opacity="0.75" filter="url(#ink-bleed)"/>

    <!-- Eyes - wide, sorrowful, expressive -->
    <ellipse cx="314" cy="112" rx="4" ry="3" fill="#f5ede5" opacity="0.8"/>
    <ellipse cx="330" cy="111" rx="4" ry="3" fill="#f5ede5" opacity="0.8"/>
    <circle cx="315" cy="112" r="2" fill="#4a6848" opacity="0.8"/>
    <circle cx="331" cy="111" r="2" fill="#4a6848" opacity="0.8"/>
    <circle cx="315.5" cy="111.5" r="0.8" fill="#1a2a1a"/>
    <circle cx="331.5" cy="110.5" r="0.8" fill="#1a2a1a"/>
    <!-- Brows - slightly raised, melancholic -->
    <path d="M 308,108 C 312,106 316,106 320,108" stroke="#5a3a20" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M 326,107 C 330,105 334,105 338,107" stroke="#5a3a20" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Mouth - open, calling out -->
    <ellipse cx="322" cy="124" rx="5" ry="3.5" fill="#a86868" opacity="0.6"/>
    <ellipse cx="322" cy="123" rx="4" ry="2" fill="#8a4a4a" opacity="0.4"/>

    <!-- Hair - flowing auburn waves -->
    <path d="M 302,105 C 295,88 296,68 305,52 C 314,40 326,36 338,40 C 350,44 358,55 358,70 C 358,80 354,95 348,108 C 344,95 340,78 335,68 C 328,58 318,54 310,60 C 305,65 303,78 304,95 Z" fill="url(#hairGrad)" opacity="0.85" filter="url(#ink-bleed)"/>

    <!-- Hair flowing long strands -->
    <path d="M 296,68 C 286,80 278,100 275,125 C 273,145 278,170 285,190 C 280,170 276,148 279,125 C 282,100 290,80 298,70 Z" fill="#5a3520" opacity="0.6" filter="url(#ink-bleed)"/>
    <path d="M 358,70 C 368,82 375,100 378,125 C 380,145 376,170 370,185 C 374,165 378,145 375,125 C 372,100 365,82 360,72 Z" fill="#5a3520" opacity="0.6" filter="url(#ink-bleed)"/>

    <!-- Laurel wreath crown -->
    <g opacity="0.7" filter="url(#ink-bleed)">
      <path d="M 305,55 C 300,48 298,40 303,36 C 306,34 310,37 309,43 C 308,48 306,52 305,55 Z" fill="url(#ivyGrad)"/>
      <path d="M 300,50 C 294,45 290,38 294,34 C 298,31 302,35 300,42 Z" fill="url(#ivyGrad)" opacity="0.8"/>
      <path d="M 345,50 C 350,43 354,36 350,32 C 347,30 343,33 344,40 C 345,45 345,48 345,50 Z" fill="url(#ivyGrad)"/>
      <path d="M 350,46 C 356,40 360,33 356,30 C 352,28 348,32 350,38 Z" fill="url(#ivyGrad)" opacity="0.8"/>
    </g>
  </g>

  <!-- Ivy and nature elements -->
  <g filter="url(#watercolor)" opacity="0.5">
    <path d="M 0,350 C 20,340 30,345 50,340 C 45,348 30,350 20,355 C 10,358 5,355 0,352 Z" fill="#4a7a50"/>
    <path d="M 50,340 C 65,330 80,335 95,332 C 90,340 75,342 60,345 C 50,348 48,345 50,340 Z" fill="#3a6a40"/>
    <path d="M 700,360 C 720,350 740,355 760,348 C 755,358 738,362 720,365 C 708,368 702,365 700,360 Z" fill="#4a7a50"/>
    <path d="M 760,348 C 775,340 790,342 800,338 L 800,350 C 790,352 780,350 768,354 Z" fill="#3a6a40"/>
  </g>

  <!-- Fading echo/reflection of the figure (ghostly duplicate) -->
  <g filter="url(#watercolor-heavy)" opacity="0.12">
    <path d="M 480,180 C 470,210 460,250 450,300 C 445,340 440,370 435,400 L 570,400 C 565,370 558,330 550,290 C 540,250 528,210 515,180 Z" fill="#c8a050"/>
    <ellipse cx="497" cy="140" rx="16" ry="22" fill="#d4b8a0"/>
  </g>

  <!-- Second, fainter echo -->
  <g filter="url(#watercolor-heavy)" opacity="0.06">
    <path d="M 580,200 C 572,225 565,260 558,310 C 555,340 552,370 550,400 L 660,400 C 657,370 652,340 645,305 C 638,265 628,225 618,200 Z" fill="#c8a050"/>
    <ellipse cx="599" cy="165" rx="14" ry="18" fill="#d4b8a0"/>
  </g>

  <!-- Ornate border flourishes -->
  <g filter="url(#ink-bleed)" opacity="0.25">
    <path d="M 30,380 C 50,372 70,376 90,370 C 110,365 130,362 150,366 C 130,370 110,372 90,374 C 70,376 50,378 35,382 Z" fill="#c8a050"/>
    <path d="M 770,380 C 750,372 730,376 710,370 C 690,365 670,362 650,366 C 670,370 690,372 710,374 C 730,376 750,378 765,382 Z" fill="#c8a050"/>
    <path d="M 30,20 C 50,28 70,24 90,30 C 110,34 130,30 150,26 C 130,28 110,30 90,26 C 70,22 50,24 35,20 Z" fill="#c8a050"/>
    <path d="M 770,20 C 750,28 730,24 710,30 C 690,34 670,30 650,26 C 670,28 690,30 710,26 C 730,22 750,24 765,20 Z" fill="#c8a050"/>
  </g>

  <!-- Title text -->
  <text x="400" y="385" text-anchor="middle" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif" font-size="18" letter-spacing="8" fill="#d4c090" opacity="0.7" filter="url(#ink-bleed)">ECHO</text>
  <text x="400" y="398" text-anchor="middle" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif" font-size="9" letter-spacing="4" fill="#8a8060" opacity="0.5">NYMPH OF THE VOICE</text>
</svg>